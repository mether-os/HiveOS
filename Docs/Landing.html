<!DOCTYPE html>

<style>
        body {
            background-color: #080A0F;
            overflow: hidden;
            margin: 0;
        }

        .hex-grid {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-rule='evenodd' stroke='%23ffffff' stroke-width='1' fill='none' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        .ambient-glow-amber {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 200, 128, 0.08) 0%, rgba(255, 200, 128, 0) 70%);
            pointer-events: none;
            z-index: 2;
        }

        .ambient-glow-blue {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(5, 102, 217, 0.08) 0%, rgba(5, 102, 217, 0) 70%);
            pointer-events: none;
            z-index: 2;
        }

        .breath-animation {
            animation: breath 8s ease-in-out infinite;
        }

        @keyframes breath {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .glass-panel {
            background: #141920;
            border: 1px solid #1E2533;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel:hover {
            border-color: #ffc880;
            box-shadow: 0 0 15px rgba(255, 200, 128, 0.1);
            transform: translateY(-1px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
<!-- Background Layers -->
<div class="hex-grid"></div>
<div class="ambient-glow-amber"></div>
<div class="ambient-glow-blue"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[480px] px-md text-center flex flex-col items-center">
<!-- Animated Presence Indicator -->
<div class="mb-lg flex items-center justify-center gap-sm">
<span class="w-2 h-2 rounded-full bg-primary breath-animation"></span>
<span class="font-label-caps text-label-caps text-primary tracking-widest">SYSTEM ONLINE</span>
</div>
<!-- HiveOS Identity -->
<div class="mb-xl">
<h1 class="font-headline-xl text-headline-xl text-on-background tracking-tighter">
                HiveOS
            </h1>
<p class="font-body-lg text-body-lg text-secondary mt-xs">
                The operating system for teams that build.
            </p>
</div>
<!-- Auth Actions -->
<div class="w-full flex flex-col gap-md items-center mb-xl">
<!-- GitHub Auth -->
<button class="glass-panel w-full max-w-[360px] h-[48px] flex items-center justify-center gap-md rounded-lg active:scale-[0.98]">
<svg fill="white" height="20" viewbox="0 0 24 24" width="20">
<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface font-medium">Continue with GitHub</span>
</button>
<!-- Google Auth -->
<button class="glass-panel w-full max-w-[360px] h-[48px] flex items-center justify-center gap-md rounded-lg active:scale-[0.98]">
<svg height="20" viewbox="0 0 24 24" width="20">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface font-medium">Continue with Google</span>
</button>
</div>
<!-- Footnote -->
<div class="mt-lg">
<p class="font-code-md text-code-md text-on-surface-variant opacity-60">
                Join <span class="text-primary font-bold">12,042</span> teams building with HiveOS
            </p>
</div>
</main>
<!-- Interactive Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-0">
<!-- Vertical Line Left -->
<div class="absolute left-container-margin top-0 bottom-0 w-[1px] bg-outline-variant/10"></div>
<!-- Vertical Line Right -->
<div class="absolute right-container-margin top-0 bottom-0 w-[1px] bg-outline-variant/10"></div>
<!-- Horizontal Line Top -->
<div class="absolute top-container-margin left-0 right-0 h-[1px] bg-outline-variant/10"></div>
<!-- Horizontal Line Bottom -->
<div class="absolute bottom-container-margin left-0 right-0 h-[1px] bg-outline-variant/10"></div>
</div>
<script>
        // Micro-interaction: Subtle movement on mouse move
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('main');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `translateX(${x}px) translateY(${y}px)`;

            // Adjust ambient glows based on mouse position
            const amber = document.querySelector('.ambient-glow-amber');
            const blue = document.querySelector('.ambient-glow-blue');
            
            amber.style.transform = `translate(${x * 2}px, ${y * 2}px)`;
            blue.style.transform = `translate(${x * -2}px, ${y * -2}px)`;
        });

        // Click interaction for buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.style.borderColor = '#ffc880';
                btn.innerHTML = `
                    <div class="flex items-center gap-sm">
                        <span class="material-symbols-outlined animate-spin" style="font-size: 18px">sync</span>
                        <span class="font-body-md text-body-md">Authorizing...</span>
                    </div>
                `;
            });
        });
    </script>
</body></html>
